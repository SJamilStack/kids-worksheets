<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindergarten Worksheet Generator</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fredoka One', 'cursive'],
            body:    ['Nunito', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          },
          keyframes: {
            float: {
              '0%,100%': { transform: 'translateY(0px) rotate(0deg)' },
              '33%':     { transform: 'translateY(-18px) rotate(2deg)' },
              '66%':     { transform: 'translateY(-8px) rotate(-1deg)' },
            },
            wiggle: {
              '0%,100%': { transform: 'rotate(-8deg)' },
              '50%':     { transform: 'rotate(8deg)' },
            },
            shimmer: {
              '0%':   { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            }
          },
          animation: {
            float:   'float 6s ease-in-out infinite',
            wiggle:  'wiggle 2s ease-in-out infinite',
            shimmer: 'shimmer 3s linear infinite',
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Nunito', sans-serif; }

    /* Mesh gradient background */
    .mesh-bg {
      background-color: #fafaff;
      background-image:
        radial-gradient(at 20% 10%,  #e0e7ff 0px, transparent 55%),
        radial-gradient(at 80% 10%,  #fce7f3 0px, transparent 55%),
        radial-gradient(at 50% 90%,  #d1fae5 0px, transparent 55%),
        radial-gradient(at 10% 80%,  #fef3c7 0px, transparent 50%),
        radial-gradient(at 90% 80%,  #ede9fe 0px, transparent 50%);
    }

    /* Shimmer gradient text */
    .gradient-text {
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899, #f59e0b, #4f46e5);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    /* Topic pill active states */
    [data-active="true"][data-topic="pets"]    { background:#6366f1; color:#fff; border-color:#6366f1; }
    [data-active="true"][data-topic="farm"]    { background:#f59e0b; color:#fff; border-color:#f59e0b; }
    [data-active="true"][data-topic="ocean"]   { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }
    [data-active="true"][data-topic="space"]   { background:#7c3aed; color:#fff; border-color:#7c3aed; }
    [data-active="true"][data-topic="weather"] { background:#06b6d4; color:#fff; border-color:#06b6d4; }
    [data-active="true"][data-topic="food"]    { background:#f97316; color:#fff; border-color:#f97316; }
    [data-active="true"][data-topic="school"]  { background:#10b981; color:#fff; border-color:#10b981; }
    [data-active="true"][data-topic="family"]  { background:#ec4899; color:#fff; border-color:#ec4899; }
    [data-active="true"][data-topic="nature"]  { background:#84cc16; color:#fff; border-color:#84cc16; }
    [data-active="true"][data-topic="sports"]  { background:#ef4444; color:#fff; border-color:#ef4444; }

    [data-active="true"] { transform: translateY(-3px) scale(1.06); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }

    /* Worksheet print styles */
    .writing-row { display: flex; flex-direction: column; margin-bottom: 14px; }
    .ln-top { border-top: 2px solid #a5b4fc; height: 20px; }
    .ln-mid { border-top: 1.5px dashed #c7d2fe; height: 20px; }
    .ln-bot { border-top: 2px solid #a5b4fc; height: 24px; }

    .story-para { font-size: 1.15rem; line-height: 1.8; margin-bottom: 4px; color: #1e1b4b; }

    /* Page accent bars cycling through 7 gradients */
    .worksheet-page:nth-child(1) .page-accent { background: linear-gradient(90deg,#6366f1,#8b5cf6); }
    .worksheet-page:nth-child(2) .page-accent { background: linear-gradient(90deg,#0ea5e9,#6366f1); }
    .worksheet-page:nth-child(3) .page-accent { background: linear-gradient(90deg,#f97316,#ec4899); }
    .worksheet-page:nth-child(4) .page-accent { background: linear-gradient(90deg,#10b981,#0ea5e9); }
    .worksheet-page:nth-child(5) .page-accent { background: linear-gradient(90deg,#8b5cf6,#ec4899); }
    .worksheet-page:nth-child(6) .page-accent { background: linear-gradient(90deg,#f59e0b,#f97316); }
    .worksheet-page:nth-child(7) .page-accent { background: linear-gradient(90deg,#ef4444,#8b5cf6); }

    /* Floating decorative shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      pointer-events: none;
    }

    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .worksheet-page {
        page-break-after: always;
        box-shadow: none !important;
        border-radius: 0 !important;
        padding: 16mm !important;
      }
      .ln-top, .ln-bot { border-color: #4338ca !important; }
      .ln-mid { border-color: #c7d2fe !important; }
      .story-para { font-size: 1.1rem !important; }
    }
  </style>
</head>
<body class="mesh-bg min-h-screen">

  <!-- ── Floating decorative shapes ────────────────────────────── -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none no-print">
    <div class="shape w-96 h-96 bg-indigo-400 -top-24 -left-24 animate-float" style="animation-delay:0s"></div>
    <div class="shape w-72 h-72 bg-pink-400 top-1/3 -right-16 animate-float" style="animation-delay:-2s"></div>
    <div class="shape w-64 h-64 bg-amber-400 bottom-0 left-1/4 animate-float" style="animation-delay:-4s"></div>
    <div class="shape w-48 h-48 bg-emerald-400 top-1/2 left-10 animate-float" style="animation-delay:-1s"></div>
  </div>

  <div class="relative z-10 max-w-3xl mx-auto px-4 py-12">

    <!-- ── Hero Header ──────────────────────────────────────────── -->
    <div class="text-center mb-10 no-print">
      <div class="text-6xl mb-3 animate-wiggle inline-block">✏️</div>
      <h1 class="font-display text-5xl sm:text-6xl gradient-text mb-3 leading-tight">
        Worksheet Generator
      </h1>
      <p class="text-slate-500 font-body text-lg font-semibold">
        Beautiful reading worksheets for little learners — in seconds.
      </p>
    </div>

    <!-- ── Topic Pills ───────────────────────────────────────────── -->
    <div class="flex flex-wrap gap-2.5 justify-center mb-8 no-print">
      <button data-topic="pets"    class="topic-btn">🐾 Pets</button>
      <button data-topic="farm"    class="topic-btn">🐄 Farm</button>
      <button data-topic="ocean"   class="topic-btn">🌊 Ocean</button>
      <button data-topic="space"   class="topic-btn">🚀 Space</button>
      <button data-topic="weather" class="topic-btn">⛅ Weather</button>
      <button data-topic="food"    class="topic-btn">🍕 Food</button>
      <button data-topic="school"  class="topic-btn">🏫 School</button>
      <button data-topic="family"  class="topic-btn">👨‍👩‍👧 Family</button>
      <button data-topic="nature"  class="topic-btn">🌿 Nature</button>
      <button data-topic="sports"  class="topic-btn">⚽ Sports</button>
    </div>

    <!-- ── Controls card ────────────────────────────────────────── -->
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl shadow-indigo-100/60 border border-white/60 p-6 sm:p-8 mb-6 no-print">
      <div class="flex flex-wrap gap-5 items-end">

        <!-- Name input -->
        <div class="flex flex-col gap-1.5 flex-1 min-w-40">
          <label for="hero" class="text-xs font-bold uppercase tracking-widest text-indigo-400">
            Child's Name
          </label>
          <input id="hero" type="text" value="Sam" placeholder="e.g. Sam, Lily…"
            class="font-body text-base font-semibold px-4 py-3 rounded-2xl border-2 border-indigo-100 bg-indigo-50/50 text-slate-800 outline-none focus:border-indigo-400 focus:bg-white transition-all placeholder-slate-300">
        </div>

        <!-- Pages -->
        <div class="flex flex-col gap-1.5 w-28">
          <label for="pages" class="text-xs font-bold uppercase tracking-widest text-indigo-400">
            Pages
          </label>
          <select id="pages"
            class="font-body text-base font-semibold px-4 py-3 rounded-2xl border-2 border-indigo-100 bg-indigo-50/50 text-slate-800 outline-none focus:border-indigo-400 focus:bg-white transition-all appearance-none cursor-pointer">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="7">7</option>
          </select>
        </div>

        <!-- Lines/page -->
        <div class="flex flex-col gap-1.5 w-36">
          <label for="lines" class="text-xs font-bold uppercase tracking-widest text-indigo-400">
            Lines / Page
          </label>
          <select id="lines"
            class="font-body text-base font-semibold px-4 py-3 rounded-2xl border-2 border-indigo-100 bg-indigo-50/50 text-slate-800 outline-none focus:border-indigo-400 focus:bg-white transition-all appearance-none cursor-pointer">
            <option value="4">4 lines</option>
            <option value="6" selected>6 lines</option>
            <option value="8">8 lines</option>
          </select>
        </div>

        <!-- Generate button -->
        <button id="btn-generate"
          class="flex items-center gap-2.5 px-8 py-3.5 rounded-2xl font-display text-lg text-white
                 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500
                 shadow-lg shadow-purple-200 hover:shadow-purple-300
                 hover:-translate-y-1 hover:scale-105
                 active:scale-95
                 transition-all duration-200 whitespace-nowrap">
          <span class="text-xl">🎲</span> Generate
        </button>

      </div>
    </div>

    <!-- ── Status ────────────────────────────────────────────────── -->
    <p id="status" class="text-center text-sm font-bold text-purple-500 min-h-5 mb-5 no-print"></p>

    <!-- ── Pages output ──────────────────────────────────────────── -->
    <div id="pages-wrap" class="flex flex-col gap-8"></div>

    <!-- ── Print button ──────────────────────────────────────────── -->
    <div class="text-center mt-8 no-print">
      <button id="btn-print"
        class="hidden px-10 py-3.5 rounded-2xl font-display text-lg border-2 border-indigo-500 text-indigo-600
               hover:bg-indigo-600 hover:text-white hover:shadow-lg hover:shadow-indigo-200
               hover:-translate-y-1 transition-all duration-200">
        🖨 Print Worksheet
      </button>
    </div>

  </div><!-- /wrapper -->

  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- App scripts -->
  <script src="js/stories.js"></script>
  <script src="js/generator.js"></script>

  <style>
    /* Topic pill base style — applied via JS or here for brevity */
    .topic-btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 8px 18px;
      border-radius: 999px;
      border: 2px solid #e0e7ff;
      background: white;
      color: #4338ca;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 2px 8px rgba(99,102,241,0.08);
      user-select: none;
    }
    .topic-btn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 18px rgba(99,102,241,0.18);
      border-color: #a5b4fc;
    }

    /* Worksheet page card */
    .worksheet-page {
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.10);
      overflow: hidden;
      border: 1px solid rgba(224,231,255,0.8);
    }

    .page-accent { height: 6px; width: 100%; }

    .page-inner { padding: 2rem 2.5rem 2.5rem; }

    .page-num {
      font-family: 'Nunito', sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #a5b4fc;
      margin-bottom: 1rem;
    }

    .story-block {
      background: linear-gradient(135deg, #fafbff 0%, #f0f4ff 100%);
      border-left: 4px solid #818cf8;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
    }

    .lines-block { }
  </style>

  <script>
    // Inline wrapper since generator calls buildLinesHTML / story builders
    // that need the page structure above to be defined first

    let activeTopic = 'pets';

    document.querySelectorAll('[data-topic]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-topic]').forEach(b => b.setAttribute('data-active', 'false'));
        btn.setAttribute('data-active', 'true');
        activeTopic = btn.dataset.topic;
      });
    });
    document.querySelector('[data-topic="pets"]').setAttribute('data-active', 'true');

    // Override buildPageHTML to use our structured markup
    function buildPageHTMLStyled(sentences, pageNumber, lineCount) {
      const paras = sentences.map(s => `<p class="story-para">${s}</p>`).join('');
      const lines = Array(lineCount).fill(`
        <div class="writing-row">
          <div class="ln-top"></div>
          <div class="ln-mid"></div>
          <div class="ln-bot"></div>
        </div>`).join('');
      return `
        <div class="worksheet-page">
          <div class="page-accent"></div>
          <div class="page-inner">
            <div class="page-num">Page ${pageNumber}</div>
            <div class="story-block">${paras}</div>
            <div class="lines-block">${lines}</div>
          </div>
        </div>`;
    }

    function handleGenerate() {
      const name      = document.getElementById('hero').value.trim() || 'Sam';
      const pageCount = parseInt(document.getElementById('pages').value);
      const lineCount = parseInt(document.getElementById('lines').value);
      const wrap      = document.getElementById('pages-wrap');

      const source = STORIES[activeTopic] || STORIES.pets;
      const pool   = [...source];
      const picked = [];
      while (picked.length < pageCount) {
        if (pool.length === 0) pool.push(...source);
        const idx = Math.floor(Math.random() * pool.length);
        picked.push(pool.splice(idx, 1)[0]);
      }

      wrap.innerHTML = picked.map((sentences, i) => {
        const named = sentences.map(s => s.replace(/\{name\}/g, name));
        return buildPageHTMLStyled(named, i + 1, lineCount);
      }).join('');

      // Stagger in
      wrap.querySelectorAll('.worksheet-page').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(28px)';
        setTimeout(() => {
          el.style.transition = 'opacity 0.45s ease, transform 0.45s cubic-bezier(.34,1.56,.64,1)';
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        }, i * 110);
      });

      document.getElementById('status').textContent = `✨ ${pageCount} pages ready for ${name}!`;
      document.getElementById('btn-print').classList.remove('hidden');

      if (typeof confetti === 'function') {
        const colors = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6'];
        confetti({ particleCount: 100, spread: 80, origin: { y: 0.5 }, colors });
        setTimeout(() => {
          confetti({ particleCount: 40, spread: 60, angle: 60,  origin: { x: 0.1, y: 0.5 }, colors });
          confetti({ particleCount: 40, spread: 60, angle: 120, origin: { x: 0.9, y: 0.5 }, colors });
        }, 200);
      }

      setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
    }

    document.getElementById('btn-generate').addEventListener('click', handleGenerate);
    document.getElementById('btn-print').addEventListener('click', () => window.print());

    handleGenerate();
  </script>

</body>
</html>
